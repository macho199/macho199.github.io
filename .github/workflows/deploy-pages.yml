name: Deploy GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test source contracts
        run: npm test

      - name: Type-check source
        run: npm run typecheck

      - name: Build Gatsby site
        run: npm run build

      - name: Verify generated styles
        run: npm run verify:styles

      - name: Verify generated layout
        run: npm run verify:layout

      - name: Verify generated home
        run: npm run verify:home

      - name: Verify generated posts
        run: npm run verify:post

      - name: Verify generated portfolio
        run: npm run verify:portfolio

      - name: Install portfolio PDF browser
        run: npx playwright install --with-deps chromium

      - name: Generate portfolio PDF
        run: npm run generate:portfolio-pdf

      - name: Verify portfolio PDF
        run: npm run verify:portfolio-pdf

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
