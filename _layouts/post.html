---
layout: default
---
<main aria-label="Content">
  <div class="wrapper">
    <header class="post-header">
      <h1 class="post-title p-name" itemprop="name headline">{{ page.title }}</h1>
      <p class="post-meta">
        <time class="dt-published" datetime="{{ page.date }}" itemprop="datePublished">{{ page.date | date: '%B %d, %Y' }}
        </time>
        <div class="fb-like" data-href="{{ site.url }}{{ page.url | prepend: site.baseurl | replace: '//', '/' }}" data-width="" data-layout="button_count" data-action="like" data-size="small" data-show-faces="true" data-share="true"></div>
      </p>
    </header>
    <div class="post-content e-content" itemprop="articleBody">      
      {{ content }}
    </div>
    <div class="fb-comments" data-href="{{ site.url }}{{ page.url | prepend: site.baseurl | replace: '//', '/' }}" data-width="100%" data-numposts="10"></div>
  </div>

  <div id="fb-root"></div>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/ko_KR/sdk.js#xfbml=1&version=v3.3&appId=331647774455773&autoLogAppEvents=1"></script>
</main>
